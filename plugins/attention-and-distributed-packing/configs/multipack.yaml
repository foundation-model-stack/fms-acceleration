# Configurations to accelerate data packing/padding in training
training:

  # dataloader configurations
  dataloader:

    # multipack dataloader
    multipack:

      # the maximum number of tokens per device, set accordingly to the
      # GPU hardware. The below number is for A100_80gb
      max_number_tokens: 60000

      # this is for future where we may need to configure
      # a pad_token_id if we eventually support the padded case
      pad_token_id: null
